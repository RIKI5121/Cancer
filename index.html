<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body class="auth-page">
    <main>
      <section class="login-page">
        <div class="login-box">
          <h1>ログイン</h1>
          

          <form class="login-form" id="loginForm" novalidate>
            <label>
              <span>ユーザー名</span>
              <input id="username" type="text" placeholder="ユーザー名を入力" autocomplete="username">
            </label>
            <label>
              <span>パスワード</span>
              <input id="password" type="password" placeholder="パスワードを入力" autocomplete="current-password">
            </label>
            <div class="login-actions">
              <button id="loginButton" type="submit">ログイン</button>
            </div>
            <div class="login-error" id="loginError"></div>
          </form>
        </div>
      </section>
    </main>

    <script src="login.js"></script>
  </body>
</html>
